# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - ntonous-nts

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Find .NET project file (if any)
        shell: bash
        run: |
          proj=$(git ls-files '*.sln' '*.csproj' | head -n1 || true)
          echo "PROJECT_PATH=$proj" >> $GITHUB_ENV

      - name: Build with dotnet
        if: env.PROJECT_PATH != ''
        run: dotnet build "${{ env.PROJECT_PATH }}" --configuration Release

      - name: dotnet publish
        if: env.PROJECT_PATH != ''
        run: dotnet publish "${{ env.PROJECT_PATH }}" -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        if: env.PROJECT_PATH != ''
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

      - name: Skip .NET build when no project found
        if: env.PROJECT_PATH == ''
        run: echo "No .sln or .csproj found in repository — skipping dotnet build/publish steps."

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_577CA1F0AB2D40D6A60BE95BAC3E4529 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_AFE4D44384CE49EDB0FE364A6CE74D45 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5B32BEC8C3074F2EAB32F4C8FAA93A44 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ntonous-nts'
          slot-name: 'Production'
          package: .
          